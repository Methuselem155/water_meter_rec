version: '3.8'

services:
  app:
    build: .
    container_name: water-meter-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/water-meter
      - JWT_SECRET=change_this_secret_in_production!
      - JWT_EXPIRE=7d
      - UPLOAD_PATH=./uploads
      - NODE_ENV=development
    volumes:
      # Map host machine uploads folder into container so images persist restarts
      - ./uploads:/usr/src/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    container_name: water-meter-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
